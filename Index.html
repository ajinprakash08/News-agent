<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#060609">
  <title>Iran-US Conflict — Qatar Live Agent</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Azeret+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060609;--sf:#0c0c12;--bd:#141418;
      --tx:#d4d4d8;--mt:#71717a;--dm:#3f3f46;--fn:#27272a;
      --red:#ef4444;--qa:#8b1538;--blue:#818cf8;
      --amber:#f59e0b;--green:#10b981;
      --mono:'Azeret Mono',monospace;--serif:'Instrument Serif',Georgia,serif;
    }
    body{background:var(--bg);color:var(--tx);font-family:var(--serif);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes borderGlow{0%,100%{border-color:rgba(139,21,56,.35)}50%{border-color:rgba(139,21,56,.75)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    .fi{animation:fadeIn .5s ease both}
    .d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}
    .shim{background:linear-gradient(90deg,#111 25%,#1a1a1f 50%,#111 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:3px}
    .hdr{position:sticky;top:0;z-index:50;background:rgba(6,6,9,.92);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
    .dot{width:7px;height:7px;border-radius:50%;display:inline-block;animation:pulse 1.5s infinite}
    .rbtn{background:none;border:1px solid #1e1e26;color:#52525b;padding:7px 12px;font-family:var(--mono);font-size:9px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:1.5px}
    .rbtn:hover{border-color:var(--qa);color:var(--qa)}
    .spinning svg{animation:spin .8s linear infinite}
    .cnt{padding:0 14px 100px;max-width:720px;margin:0 auto}
    .urg{margin:18px 0 10px;padding:5px 10px;display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px}
    h1.hl{font-family:var(--serif);font-size:clamp(24px,5.5vw,38px);font-weight:400;font-style:italic;line-height:1.12;color:#fafafa;margin:0 0 14px;letter-spacing:-.01em}
    .sum{font-size:14px;line-height:1.7;color:#9ca3af;margin:0 0 6px;max-width:620px}
    .meta{font-family:var(--mono);font-size:8px;color:var(--fn);margin:0 0 22px;display:flex;gap:14px;flex-wrap:wrap}
    .qcard{border:1px solid rgba(139,21,56,.5);background:linear-gradient(135deg,rgba(139,21,56,.08) 0%,var(--bg) 100%);margin-bottom:20px;animation:borderGlow 3s ease infinite;overflow:hidden}
    .qhdr{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
    .qhdr:hover{background:rgba(139,21,56,.04)}
    .qdtl{padding:10px 16px 14px}
    .qdi{padding:8px 0;font-size:12px;color:#a1a1aa;line-height:1.5;display:flex;gap:8px}
    .qdi+.qdi{border-top:1px solid rgba(139,21,56,.1)}
    .dvd{height:1px;margin:0 0 20px;opacity:.3;background:linear-gradient(90deg,var(--qa) 0%,var(--red) 50%,transparent 100%)}
    .stl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:2.5px;color:var(--dm);margin:0 0 12px}
    .upd{padding:14px 16px;border-left:3px solid;margin-bottom:6px;background:var(--sf);cursor:pointer;transition:background .15s}
    .upd:hover{background:#12121a}
    .fact{padding:10px 14px;background:var(--sf);border:1px solid var(--bd);margin-bottom:5px;font-size:12px;color:#a1a1aa;line-height:1.5;display:flex;gap:8px}
    .stag{padding:4px 10px;background:var(--sf);border:1px solid var(--bd);font-family:var(--mono);font-size:9px;color:#52525b;display:inline-block;margin:0 5px 5px 0}
    .err{margin:10px 0;padding:12px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.15);font-family:var(--mono);font-size:10px;color:var(--amber);line-height:1.6;word-break:break-word}
    .mo{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:20px}
    .mbox{background:#111116;border:1px solid var(--bd);padding:28px;max-width:420px;width:100%}
    .mbox h2{font-family:var(--serif);font-size:22px;color:#fafafa;margin-bottom:6px;font-style:italic}
    .mbox p{font-size:13px;color:var(--mt);line-height:1.6;margin-bottom:16px}
    .mbox input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--fn);color:#fafafa;font-family:var(--mono);font-size:12px;margin-bottom:12px;outline:none}
    .mbox input:focus{border-color:var(--qa)}
    .mbtn{width:100%;padding:11px;background:var(--qa);border:none;color:#fff;font-family:var(--mono);font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:2px}
    .mbtn:hover{background:#a01d45}
    .note{font-family:var(--mono);font-size:9px;color:var(--dm);margin-top:12px;line-height:1.6}
    .note a{color:var(--qa)}
    .ftr{position:fixed;bottom:0;left:0;right:0;z-index:40;background:linear-gradient(transparent,var(--bg) 35%);padding:28px 14px 14px}
    .ftr-t{font-family:var(--mono);font-size:7px;color:#1e1e26;text-align:center;text-transform:uppercase;letter-spacing:2px}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const REFRESH_MS = 15 * 60 * 1000;

const SYS = `You are a concise breaking news analyst covering the Iran-US conflict with SPECIAL FOCUS on Qatar and Gulf state impacts. Based on the latest web search results, provide a structured JSON briefing.

IMPORTANT: Always search for Qatar-specific updates including: Al Udeid Air Base status, Doha missile interceptions, Qatar airspace/flight status, Qatar diplomatic statements, impact on residents in Qatar, and Gulf state sovereignty violations.

Respond ONLY with valid JSON, no markdown, no backticks, no preamble.

JSON schema:
{"headline":"string max 120 chars","urgency":"CRITICAL|HIGH|ELEVATED|MODERATE","summary":"2-3 sentences","qatarAlert":{"status":"DANGER|CAUTION|MONITORING","message":"1-2 sentences for Qatar residents","airspace":"OPEN|CLOSED|RESTRICTED","details":["detail strings"]},"updates":[{"time":"string","title":"string","detail":"1-2 sentences","category":"MILITARY|DIPLOMATIC|QATAR|GULF|HUMANITARIAN"}],"keyFacts":["string array 5 items"],"sources":["string array"]}

Put QATAR and GULF category updates first. 5-8 updates total. Be factual and precise.`;

const FB = {
  headline:"US-Israel Strike Iran — Qatar Hit by 66 Iranian Missiles in Retaliation",
  urgency:"CRITICAL",
  summary:"The US and Israel launched joint strikes on Iran on Feb 28, 2026. Iran retaliated by firing 66 missiles at Qatar targeting Al Udeid Air Base. 16 people injured from shrapnel across Qatar. Airspace closed.",
  qatarAlert:{status:"DANGER",message:"Active missile threat. Qatar intercepted three waves of Iranian missiles. Stay indoors and away from military sites.",airspace:"CLOSED",
    details:["66 missiles fired at Qatar — all intercepted by air defenses","16 injured from shrapnel; 1 in serious condition","Al Udeid Air Base (US base near Doha) was primary target","Qatar airspace CLOSED — Qatar Airways flights suspended","Interior Ministry: Stay away from military sites, do not touch debris","Third wave of missiles intercepted over Doha","Qatar reserves right to respond under international law","Long-range early warning radar in northern Qatar also targeted"]},
  updates:[
    {time:"Ongoing",title:"Third Missile Wave Intercepted Over Doha",detail:"Qatar MOD confirmed interception of a third wave. Qatar reserves right to respond under international law.",category:"QATAR"},
    {time:"Hours ago",title:"16 Injured From Shrapnel Across Qatar",detail:"114 reports of falling shrapnel. One person in serious condition. Interior Ministry urges public to remain indoors.",category:"QATAR"},
    {time:"Feb 28",title:"Al Udeid Air Base Targeted",detail:"Iran fired missiles at Al Udeid Air Base hosting US forces. Qatar condemned as flagrant violation of sovereignty.",category:"QATAR"},
    {time:"Feb 28",title:"Qatar Airspace Shut — Flights Suspended",detail:"Qatar closed airspace. Qatar Airways suspended flights. About half of all flights to Qatar cancelled.",category:"GULF"},
    {time:"Feb 28",title:"UAE, Bahrain, Kuwait Under Fire",detail:"Iran struck US assets across Gulf. One killed in Abu Dhabi. Drone hit near US Navy HQ in Bahrain. Fire on Dubai Palm Islands.",category:"GULF"},
    {time:"Feb 28",title:"Khamenei Confirmed Killed",detail:"Supreme Leader killed in US-Israel strikes. Iran declared 40 days mourning. IRGC pledges all US/Israeli assets are targets.",category:"MILITARY"},
    {time:"Feb 28",title:"201+ Killed Including 80 Children",detail:"Minab school airstrike killed 80+. At least 201 total casualties in Iran.",category:"HUMANITARIAN"},
    {time:"Feb 28",title:"Oman: 'This Is Not Your War'",detail:"Omani FM expressed dismay. EU called for restraint. UN Security Council held emergency session.",category:"DIPLOMATIC"}],
  keyFacts:["66 Iranian missiles fired at Qatar — all intercepted","Al Udeid Air Base was the primary Qatar target","Qatar airspace closed; Qatar Airways flights suspended","Iran declared all US/Israeli assets legitimate targets","Nuclear talks collapsed days before the attack"],
  sources:["Al Jazeera","CNN","PBS NewsHour","Euronews","CNBC"]
};

const CC = {MILITARY:"#ef4444",DIPLOMATIC:"#818cf8",QATAR:"#8b1538",GULF:"#f59e0b",HUMANITARIAN:"#10b981",DOMESTIC:"#f59e0b"};
const CI = {MILITARY:"⚔️",DIPLOMATIC:"🌐",QATAR:"🇶🇦",GULF:"🏜️",HUMANITARIAN:"🏥",DOMESTIC:"🏛️"};
const UC = {CRITICAL:"#ef4444",HIGH:"#f97316",ELEVATED:"#eab308",MODERATE:"#3b82f6"};
const QC = {DANGER:"#ef4444",CAUTION:"#f59e0b",MONITORING:"#3b82f6"};

// STATE
let S = {
  key: localStorage.getItem('iran_key') || '',
  data: null, loading: true, err: null,
  lastR: null, nextR: null, cd: '--:--',
  spin: false, expU: null, showQ: true, modal: false, fetchOk: 0
};

function up(p) { Object.assign(S, p); draw(); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function doFetch(manual) {
  if (manual) up({spin:true});
  up({loading:true, err:null});

  if (!S.key) {
    up({loading:false, data:FB, modal:true, lastR:new Date(), nextR:new Date(Date.now()+REFRESH_MS)});
    return;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': S.key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        system: SYS,
        messages: [{
          role: 'user',
          content: 'Search for the absolute latest news on the Iran-US war/conflict RIGHT NOW. ESPECIALLY search for: Qatar missile attacks, Al Udeid Air Base status, Doha safety alerts, Qatar airspace status, Gulf state impacts, military operations, diplomatic reactions, casualties. Today is ' + new Date().toLocaleDateString() + '.'
        }],
        tools: [{ type: 'web_search_20250305', name: 'web_search' }]
      })
    });

    const raw = await res.text();

    if (!res.ok) {
      throw new Error('HTTP ' + res.status + ': ' + raw.substring(0, 400));
    }

    const result = JSON.parse(raw);

    if (result.type === 'error') {
      throw new Error(result.error?.message || JSON.stringify(result.error));
    }

    // Extract text blocks from response
    const textBlocks = (result.content || []).filter(b => b.type === 'text');
    if (textBlocks.length === 0) {
      // Maybe the model only used tools and returned no text yet
      // Try to get any useful content
      const types = (result.content || []).map(b => b.type).join(', ');
      throw new Error('No text in response. Got block types: ' + types + '. The model may need a follow-up. Try refreshing.');
    }

    const txt = textBlocks.map(b => b.text).join('\n');
    const clean = txt.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();

    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch(pe) {
      throw new Error('JSON parse error: ' + pe.message + '. First 200 chars: ' + clean.substring(0, 200));
    }

    const now = new Date();
    S.fetchOk++;
    up({data:parsed, lastR:now, nextR:new Date(now.getTime()+REFRESH_MS), loading:false, spin:false, err:null});

  } catch(e) {
    const now = new Date();
    up({
      err: e.message,
      loading: false, spin: false,
      data: S.data || FB,
      lastR: S.lastR || now,
      nextR: S.nextR || new Date(now.getTime() + REFRESH_MS)
    });
  }
}

// Countdown ticker
setInterval(() => {
  if (S.nextR) {
    const d = S.nextR.getTime() - Date.now();
    if (d <= 0) S.cd = 'Updating…';
    else { const m=Math.floor(d/60000), s=Math.floor((d%60000)/1000); S.cd=m+':'+String(s).padStart(2,'0'); }
    const el = document.getElementById('cd');
    if (el) el.textContent = S.cd;
  }
}, 1000);

// Auto-refresh
setInterval(() => doFetch(), REFRESH_MS);

function draw() {
  const {data:D, loading:L, err:E, lastR:LR, spin:SP, expU:EU, showQ:SQ, modal:MO, key:K} = S;
  const a = document.getElementById('app');
  const uc = D ? UC[D.urgency]||UC.HIGH : UC.HIGH;
  let h = '';

  // MODAL
  if (MO || !K) {
    h += `<div class="mo"><div class="mbox">
      <h2>🔑 API Key Required</h2>
      <p>This agent uses Claude API with web search to fetch live news every 15 minutes. Enter your Anthropic API key below.</p>
      <input type="password" id="ki" placeholder="sk-ant-api03-..." value="${esc(K||'')}"/>
      <button class="mbtn" onclick="saveK()">Activate Live Updates</button>
      <p class="note">Key stored only on this device. Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
      ${D ? '<p class="note" style="margin-top:8px;cursor:pointer;color:var(--qa)" onclick="up({modal:false})">← Skip (use cached data)</p>' : ''}
    </div></div>`;
  }

  // HEADER
  h += `<div class="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="dot" style="background:${L?'var(--amber)':'var(--red)'}"></span>
      <span style="font-family:var(--mono);font-size:9px;color:${L?'var(--amber)':'var(--red)'};text-transform:uppercase;letter-spacing:2.5px">${L?'UPDATING':'LIVE'}</span>
      <span style="font-family:var(--mono);font-size:8px;color:var(--fn);letter-spacing:1px">IRAN–US • QATAR</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="cd" style="font-family:var(--mono);font-size:8px;color:var(--dm)">${S.cd}</span>
      <button class="rbtn ${SP?'spinning':''}" onclick="doFetch(true)" ${SP?'disabled':''}>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
    </div>
  </div><div class="cnt">`;

  // LOADING SKELETON
  if (L && !D) {
    h += '<div style="padding:28px 0"><div class="shim" style="height:26px;width:80%;margin-bottom:14px"></div><div class="shim" style="height:14px;width:100%;margin-bottom:7px"></div><div class="shim" style="height:14px;width:65%;margin-bottom:20px"></div><div class="shim" style="height:120px;width:100%;margin-bottom:10px"></div><div class="shim" style="height:80px;width:100%"></div></div>';
  }

  // ERROR
  if (E && D) {
    h += `<div class="err">
      <div style="margin-bottom:6px">⚠ <strong>Update failed</strong></div>
      <div style="font-size:9px;color:#b45309;margin-bottom:8px">${esc(E)}</div>
      <div style="color:var(--dm);font-size:9px">Showing ${S.fetchOk>0?'last successful':'fallback cached'} data. Next auto-retry in <span style="color:var(--amber)">${S.cd}</span></div>
      <div style="margin-top:8px;display:flex;gap:10px">
        <span style="cursor:pointer;color:var(--qa);text-decoration:underline" onclick="up({modal:true})">Check API key</span>
        <span style="cursor:pointer;color:var(--qa);text-decoration:underline" onclick="doFetch(true)">Retry now</span>
      </div>
    </div>`;
  }

  if (D) {
    // URGENCY
    h += `<div class="fi d1"><span class="urg" style="background:${uc}15;border:1px solid ${uc};color:${uc}">${D.urgency}</span></div>`;
    // HEADLINE
    h += `<h1 class="hl fi d2">${esc(D.headline)}</h1>`;
    // SUMMARY
    h += `<p class="sum fi d3">${esc(D.summary)}</p>`;
    // META
    const ts = LR ? LR.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '—';
    h += `<div class="meta"><span>UPDATED ${ts}</span><span>AUTO: 15MIN</span><span>LIVE FETCHES: ${S.fetchOk}</span></div>`;

    // QATAR ALERT CARD
    if (D.qatarAlert) {
      const qc = QC[D.qatarAlert.status] || QC.CAUTION;
      const airOpen = D.qatarAlert.airspace === 'OPEN';
      h += `<div class="qcard fi"><div class="qhdr" onclick="up({showQ:!S.showQ})">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <span style="font-size:18px">🇶🇦</span>
          <div>
            <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:${qc};text-transform:uppercase;letter-spacing:2px">Qatar — ${D.qatarAlert.status}</div>
            <div style="font-size:13px;color:var(--tx);margin-top:4px;line-height:1.4">${esc(D.qatarAlert.message)}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${D.qatarAlert.airspace ? `<span style="font-family:var(--mono);font-size:8px;padding:3px 8px;background:${airOpen?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)'};color:${airOpen?'var(--green)':'var(--red)'};letter-spacing:1.5px">✈ ${D.qatarAlert.airspace}</span>` : ''}
          <span style="color:var(--dm);font-size:12px;transform:rotate(${SQ?180:0}deg);transition:transform .2s">▾</span>
        </div>
      </div>`;
      if (SQ && D.qatarAlert.details) {
        h += '<div class="qdtl">';
        D.qatarAlert.details.forEach(d => { h += `<div class="qdi"><span style="color:var(--qa);flex-shrink:0">▸</span><span>${esc(d)}</span></div>`; });
        h += '</div>';
      }
      h += '</div>';
    }

    h += '<div class="dvd"></div>';

    // UPDATES
    h += '<h2 class="stl">Latest Developments</h2>';
    (D.updates || []).forEach((u, i) => {
      const c = CC[u.category] || CC.MILITARY;
      const ic = CI[u.category] || '📌';
      const op = EU === i;
      h += `<div class="upd fi" style="border-left-color:${c};${op?'background:'+c+'12':''};animation-delay:${.08+i*.05}s" onclick="toggleU(${i})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
              <span style="font-size:12px">${ic}</span>
              <span style="font-family:var(--mono);font-size:8px;color:${c};text-transform:uppercase;letter-spacing:1.5px">${u.category}</span>
              <span style="font-family:var(--mono);font-size:8px;color:var(--fn)">${esc(u.time)}</span>
            </div>
            <div style="font-size:14px;font-weight:600;color:#e4e4e7;line-height:1.3">${esc(u.title)}</div>
          </div>
          <span style="font-size:12px;color:var(--fn);transform:rotate(${op?180:0}deg);transition:transform .15s;flex-shrink:0;margin-top:3px">▾</span>
        </div>
        ${op ? `<p style="font-size:12px;color:#9ca3af;line-height:1.6;margin-top:9px;padding-top:9px;border-top:1px solid #151520">${esc(u.detail)}</p>` : ''}
      </div>`;
    });

    // KEY FACTS
    h += '<h2 class="stl" style="margin-top:24px">Key Facts</h2>';
    (D.keyFacts || []).forEach((f, i) => {
      h += `<div class="fact fi" style="animation-delay:${.3+i*.04}s"><span style="color:var(--red);flex-shrink:0">▸</span>${esc(f)}</div>`;
    });

    // SOURCES
    h += '<h2 class="stl" style="margin-top:24px">Sources</h2><div>';
    (D.sources || []).forEach(s => { h += `<span class="stag">${esc(s)}</span>`; });
    h += '</div>';

    // SETTINGS
    h += `<div style="margin-top:28px;padding:14px;background:rgba(139,21,56,.04);border:1px solid rgba(139,21,56,.12)">
      <div style="font-family:var(--mono);font-size:9px;color:var(--qa);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">⚙️ Settings</div>
      <div style="font-size:12px;color:var(--mt);cursor:pointer" onclick="up({modal:true})">${K ? '✅ API key set — tap to change' : '⚠️ No API key — tap to add'}</div>
      <div style="font-size:11px;color:var(--dm);margin-top:6px;cursor:pointer;text-decoration:underline" onclick="clearK()">Clear key &amp; reset</div>
    </div>`;
  }

  h += '</div>';
  h += '<div class="ftr"><div class="ftr-t">AI News Agent • Qatar Focus • Auto-refresh 15 min</div></div>';
  a.innerHTML = h;
}

function saveK() {
  const v = document.getElementById('ki')?.value?.trim();
  if (v) {
    localStorage.setItem('iran_key', v);
    up({key:v, modal:false});
    doFetch();
  }
}
function clearK() {
  localStorage.removeItem('iran_key');
  up({key:'', data:null, modal:true, fetchOk:0});
}
function toggleU(i) { up({expU: S.expU===i ? null : i}); }

doFetch();
